<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة عنصر جديد - دليل البحر الأحمر</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-container {
            background: white;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: right;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #005f73;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="file"] {
            padding: 8px;
            background: #f8f9fa;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .btn-submit {
            background-color: #005f73;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #0a9396;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <img src="images/logo.png" alt="Logo">
            <a href="index.html">الرئيسية</a>
            <a href="admin_panel.html">لوحة التحكم</a>
        </div>
    </nav>

    <div class="container">
        <h1>إضافة عنصر جديد (Add Item)</h1>
        
        <div class="form-container">
            <div class="form-group">
                <label>اسم العنصر:</label>
                <input type="text" placeholder="أدخل اسم المعلم السياحي">
            </div>

            <div class="form-group">
                <label>وصف العنصر:</label>
                <textarea placeholder="اكتب وصفاً تفصيلياً للمكان..."></textarea>
            </div>

            <div class="form-group">
                <label>شعار العنصر (Logo):</label>
                <input type="file">
            </div>

            <button class="btn-submit">إضافة الآن</button>
        </div>
    </div>

</body>
</html>
