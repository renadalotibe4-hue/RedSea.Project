<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - دليل البحر الأحمر</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 10px;
            padding: 45px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            border-top: 4px solid #005f73;
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-title h1 {
            color: #005f73;
            font-size: 22px;
            margin: 0 0 6px 0;
        }
        .login-title p {
            color: #999;
            font-size: 14px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            color: #333;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #005f73;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #005f73;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 5px;
        }
        .btn-login:hover { background-color: #0a9396; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #005f73; }
    </style>
</head>
<body>
<nav>
    <div class="nav-container">
        <img src="images/logo.png" alt="Red Sea Logo">
        <a href="index.html">الرئيسية</a>
        <a href="about.html">من نحن</a>
        <a href="admin_login.html">لوحة التحكم</a>
    </div>
</nav>

<div class="container">
    <div class="login-wrapper">
        <div class="login-box">

            <div class="login-title">
                <h1>تسجيل دخول</h1>
                <p>مشروع البحر الأحمر</p>
            </div>

            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" placeholder="أدخل اسم المستخدم">
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="أدخل كلمة المرور">
            </div>

            <button class="btn-login" onclick="window.location.href='admin_panel.html'">
                تسجيل الدخول
            </button>

            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>
</div>
</body>
</html>
